.form-switch .form-check-input:checked {
  background: var(--primary);
}

}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {

.btn:focus-visible {

  outline-offset: 2px;
}

svg {

  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

  &lt;div class=&quot;page&quot;&gt;
    &lt;header&gt;
      &lt;h1&gt;Participant names: linguistic associations&lt;/h1&gt;
      &lt;p class=&quot;subtitle&quot;&gt;An editable, uncertainty-aware review of 30 learner names reconciled with the supplied Burnaby class-list PDF.&lt;/p&gt;

    &lt;aside class=&quot;disclaimer&quot; aria-labelledby=&quot;limitation-heading&quot;&gt;
      &lt;strong id=&quot;limitation-heading&quot;&gt;Important limitation&lt;/strong&gt;
      &lt;p&gt;Country, nationality, ethnicity, race, citizenship, birthplace, or cultural identity cannot be determined from appearance or from a name. Unless explicitly marked as user-provided, the entries below describe only rough linguistic or geographic associations of the &lt;em&gt;name forms&lt;/em&gt; themselves.&lt;/p&gt;
      &lt;p&gt;These provisional labels may be wrong. Names cross borders, languages, religions, families, and spelling systems; people also use adopted, shortened, married, or transliterated names. Do not use this page to make decisions about any participant.&lt;/p&gt;
    &lt;/aside&gt;

        &lt;article class=&quot;analysis-item&quot;&gt;
          &lt;h3&gt;What the charts can show&lt;/h3&gt;
          &lt;p id=&quot;largest-group-analysis&quot;&gt;They summarize the provisional labels currently assigned to the 30 name strings.&lt;/p&gt;
        &lt;/article&gt;
        &lt;article class=&quot;analysis-item&quot;&gt;
          &lt;h3&gt;Why uncertainty is substantial&lt;/h3&gt;
          &lt;ul&gt;
            &lt;li&gt;Widely used given names such as Peter, Mary, Sarah, Nina, Emily, and Helen carry little location-specific information on their own.&lt;/li&gt;
            &lt;li&gt;Romanization can map several original spellings to the same Latin-letter form.&lt;/li&gt;
            &lt;li&gt;Initials, capitalization, incomplete names, and family-name changes remove context.&lt;/li&gt;
            &lt;li&gt;A name’s linguistic history is not the same as its bearer’s identity or life history.&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/article&gt;
        &lt;article class=&quot;analysis-item&quot;&gt;
          &lt;h3&gt;Appropriate use&lt;/h3&gt;
          &lt;p&gt;Use this only as an editable language-and-naming exercise. It is not suitable for demographic reporting, student support decisions, hiring, screening, eligibility, or any other decision about people.&lt;/p&gt;

      &lt;/div&gt;
      &lt;p class=&quot;method-note&quot;&gt;&lt;strong&gt;Method note:&lt;/strong&gt; Names and roster count were reconciled against the supplied Burnaby class-list PDF. The Chinese origins of Peter Chen and Emily Zhang and the Vietnamese origin of Tracy Tong were provided by the user. All other labels remain provisional name-form associations. No profile-photo appearance was used. “High confidence” means the full spelling pattern has a relatively distinctive association—or that the origin was explicitly supplied—not that nationality, ethnicity, citizenship, or identity was inferred.&lt;/p&gt;
